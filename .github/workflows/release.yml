name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test + smoke (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./glue/... -count=1 -timeout 5m

      - name: Build and smoke (amd64)
        shell: pwsh
        run: |
          go build -o glue.exe ./glue
          .\glue.exe --help

  build:
    name: build glue-${{ matrix.goarch }}.exe
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Build glue.exe
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          out="glue-windows-${{ matrix.goarch }}.exe"
          go build -trimpath \
            -ldflags "-s -w -X github.com/gluestick-sh/cli/version.Version=${version} -X github.com/gluestick-sh/cli/version.Commit=${GITHUB_SHA} -X github.com/gluestick-sh/cli/version.Date=${date}" \
            -o "$out" ./glue
          sha256sum "$out" | awk '{print $1}' > "$out.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: glue-windows-${{ matrix.goarch }}
          path: |
            glue-windows-${{ matrix.goarch }}.exe
            glue-windows-${{ matrix.goarch }}.exe.sha256

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: glue-windows-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
